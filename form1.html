<html>
    <body>
        <form>
            <div class="form">
                <h2>Student Form</h2>
                <label for="name" id="fname">Name:</label>
                <input type="text" name="name" id="fname" placeholder="eg:Anuj"> <br>
                <label for="name" id="lname">Lname:</label>
                <input type="text" name="name" id="lname" placeholder="eg:Rai"><br>
                <label for="phno" id="phone">Phone No:</label>
                <input type="number" name="phno" id="phone" placeholder="eg:9816354451"><br>
                <label for="gender" id="male">Male</label>
                <input type="radio" name="gender" id="male">
                <label for="gender" id="female">Female</label>
                <input type="radio" name="gender" id="female">
                <label for="submit" id="submit"></label>
                <input type="submit" name="submit" id="submit">
        
            </div>
        </form>
        <style>
            div{
               background-color: aquamarine;
               width: auto;
               text-align: center;
               align-content: center;
            
               justify-content: center;
               display: flexbox;
               flex-direction: row;
               box-shadow: 2px 4px 8px;
               border-radius: 8px;
            }
        </style>
    </body>
</html>
