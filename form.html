<html>
    <title> formpage</title>
    <body>
        <div>
            <h1>Resgistration Form</h1>
        </div>
        <div>
            <form >
                <label for="name" id="fname">Name:</label>
                <input type="text" id="fname" placeholder="Enter your name"> <br>
                <label for="age" id="age">Age:</label>
                <input type="number" id="age" placeholder="Enter your age"> <br>
                <label for="contact" id="contact">Contact:</label>
                <input type="number" name="contact" is="contact" placeholder="eg:982318293">
                <div class="gender">
                    <h2>Gender</h2>
                    <label for="gender" id="male"> Male</label>
                    <input type="radio" name="gender" id="male">
                    <label for="gender" id="female"> Female</label>
                <input type="radio" name="gender" id="female">
                </div>
                <div class="faculty">
                    <h2>Faculty</h2>
                    <label for="course" id="science"> Science</label>
                    <input type="radio" name="course" id="science">
                    <label for="course" id="commerce"> commerce</label>
                    <input type="radio" name="course" id="commerce">
                    <label for="course" id="management"> Management</label>
                    <input type="radio" name="course" id="management">

                </div>
                <div class="hobbies">
                    <label for="hobbies" id="reading">Reading</label>
                    <input type="checkbox" name="hobbies" id="reading">
                    <label for="hobbies" id="sports">Sports</label>
                    <input type="checkbox" name="hobbies" id="sports">
                    <label for="hobbies" id="music">Music</label>
                    <input type="checkbox" name="hobbies" id="music">


                </div>
                <br><label for="submit"></label>
                <input type="submit" name="submit">
                


                
            </form>
        </div>
        <style>
            form{
                background-color: aquamarine;
                text-align: center;
                width: 100%;
                margin-left: 20px;
                border-radius: 4px;
                flex-direction: row;
                box-shadow: 3px 4px 5px;
            }
        </style>

    </body>
</html>
